name: Backend CI/CD

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Backend.sln

      - name: Build
        run: dotnet build Backend.sln --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test Backend.sln --no-build --verbosity normal || true

      - name: Publish artifact
        if: always()
        run: |
          dotnet publish com.split.backend/com.split.backend.csproj -c Release -o publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: publish

  publish_image_and_deploy:
    name: Build Docker image and Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: com.split.backend/Dockerfile
          push: true
          tags: ghcr.io/equilibriac/budgetly-backend:${{ github.sha }}

      - name: Trigger Render deploy (optional)
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "${RENDER_SERVICE_ID}" ] || [ -z "${RENDER_API_KEY}" ]; then
            echo "Render secrets not set; skipping deploy"
            exit 0
          fi

          echo "Triggering Render deploy for service ${RENDER_SERVICE_ID}"
          curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}'
